<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuTranslate AI Agent (Standalone Edition)</title>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM UMD CDN (Production) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel Standalone (allows JSX compilation directly in-browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom scrollbar configurations for a premium dark terminal look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col antialiased">

    <!-- Destination Root for React mounting -->
    <div id="root"></div>

    <!-- Browser Compile Core Script -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        // Fallback API key definition for the Cloud Agent
        const apiKey = "";

        function App() {
          // Application Modes & Engines
          const [engineMode, setEngineMode] = useState('local'); // 'local' | 'cloud'
          
          // Script and Engine States
          const [scriptsLoaded, setScriptsLoaded] = useState(false);
          const [scriptsError, setScriptsError] = useState(false);
          const [localEngineLoading, setLocalEngineLoading] = useState(false);
          const [localDownloadProgress, setLocalDownloadProgress] = useState({});
          const [loadedModelId, setLoadedModelId] = useState('');

          // Workspace Text States
          const [docPages, setDocPages] = useState([]);
          const [currentPageIndex, setCurrentPageIndex] = useState(0);
          const [fileName, setFileName] = useState('');
          const [targetLang, setTargetLang] = useState('Spanish');
          const [tone, setTone] = useState('Professional');
          const [glossary, setGlossary] = useState('Translate technical terms accurately. Keep standard unit abbreviations intact.');
          
          // Execution Log and Navigation States
          const [isProcessing, setIsProcessing] = useState(false);
          const [progress, setProgress] = useState(0);
          const [logs, setLogs] = useState([]);
          const [activeTab, setActiveTab] = useState('editor'); // 'editor' | 'terminal'
          const [errorMsg, setErrorMsg] = useState('');

          // Translator Engine reference
          const localTranslatorRef = useRef(null);

          // Mapping of languages to local OPUS-MT Model names (quantized for browser execution)
          const LOCAL_MODEL_MAP = {
            Spanish: { id: 'Xenova/opus-mt-en-es', label: 'English ➔ Spanish' },
            French: { id: 'Xenova/opus-mt-en-fr', label: 'English ➔ French' },
            German: { id: 'Xenova/opus-mt-en-de', label: 'English ➔ German' },
            Vietnamese: { id: 'Xenova/opus-mt-en-vi', label: 'English ➔ Vietnamese' },
            Japanese: { id: 'Xenova/opus-mt-en-jap', label: 'English ➔ Japanese' },
            Chinese: { id: 'Xenova/opus-mt-en-zh', label: 'English ➔ Chinese' },
            Arabic: { id: 'Xenova/opus-mt-en-ar', label: 'English ➔ Arabic' },
            Russian: { id: 'Xenova/opus-mt-en-ru', label: 'English ➔ Russian' }
          };

          // Sample document text to allow instant testing
          const SAMPLE_DOC = [
            {
              pageNumber: 1,
              originalText: `Abstract—Quantum computing represents a paradigm shift in processing power, leveraging superposition and entanglement to solve problems intractable for classical computers. \n\nIn this paper, we present a novel topological qubit architecture. By utilizing Majorana fermions at the interfaces of superconductor-semiconductor heterostructures, we achieve a 10x improvement in coherence times (T1). \n\nI. INTRODUCTION\nClassical logic gates operate on binary states (0 or 1). Quantum bits, or qubits, exist in linear combinations of states, allowing exponential parallel computations. However, environmental decoherence remains the primary challenge to building a fault-tolerant quantum computer.`,
              translatedText: '',
              thoughts: 'Ready for local or cloud translation analysis.'
            },
            {
              pageNumber: 2,
              originalText: `II. EXPERIMENTAL SETUP & CRYOGENICS\nThe experimental apparatus operates inside a dilution refrigerator capable of cooling the superconductor down to a mixing chamber temperature of 10 mK (milli-Kelvin).\n\nHigh-frequency coaxial cables deliver microwave control pulses directly to the quantum chip. \n\nFigure 2.1 displays the feedback loop of our cryogenic interface. We observe critical currents of up to 450 nA, verifying robust topological phase transitions. These physical conditions require pristine isolation from electromagnetic interference (EMI).`,
              translatedText: '',
              thoughts: 'Ready for local or cloud translation analysis.'
            }
          ];

          // Load PDF.js and jsPDF dynamically
          useEffect(() => {
            const loadScript = (src) => {
              return new Promise((resolve, reject) => {
                if (document.querySelector(`script[src="${src}"]`)) {
                  resolve();
                  return;
                }
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
              });
            };

            Promise.all([
              loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js'),
              loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js')
            ])
              .then(() => {
                window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
                setScriptsLoaded(true);
                addLog("Initialization complete. Standalone engine parsed & ready.", "info");
              })
              .catch(err => {
                setScriptsError(true);
                addLog("Failed to fetch parsing packages. Check your browser internet connection.", "error");
              });
          }, []);

          // Logger helper
          const addLog = (message, type = 'info') => {
            const timestamp = new Date().toLocaleTimeString();
            setLogs(prev => [
              { id: Date.now() + Math.random(), time: timestamp, message, type },
              ...prev
            ].slice(0, 100)); // Maintain last 100 entries
          };

          // Extract structured text from loaded PDF
          const handlePdfUpload = async (e) => {
            const file = e.target.files?.[0];
            if (!file) return;

            if (!scriptsLoaded) {
              setErrorMsg("Libraries are still loading. Please wait a moment.");
              return;
            }

            setFileName(file.name);
            setDocPages([]);
            setCurrentPageIndex(0);
            setErrorMsg('');
            addLog(`Uploaded: "${file.name}". Starting extraction...`, "info");

            try {
              const arrayBuffer = await file.arrayBuffer();
              const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
              addLog(`PDF Structure successfully read. Total pages: ${pdf.numPages}. Starting text mapping...`, "info");

              const pagesData = [];
              for (let i = 1; i <= pdf.numPages; i++) {
                addLog(`Analyzing layout on Page ${i}...`, "info");
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                let lastY = null;
                let lines = [];
                let currentLine = [];
                
                textContent.items.forEach(item => {
                  const y = item.transform[5];
                  if (lastY === null || Math.abs(y - lastY) < 6) {
                    currentLine.push(item.str);
                  } else {
                    lines.push(currentLine.join(' '));
                    currentLine = [item.str];
                  }
                  lastY = y;
                });
                
                if (currentLine.length > 0) {
                  lines.push(currentLine.join(' '));
                }

                const pageText = lines.join('\n');
                pagesData.push({
                  pageNumber: i,
                  originalText: pageText || "[Empty page or scanned element without embedded text]",
                  translatedText: '',
                  thoughts: 'Ready'
                });
              }

              setDocPages(pagesData);
              addLog("PDF extracted successfully. Choose engine and click Translate.", "success");
            } catch (error) {
              console.error(error);
              setErrorMsg("Failed to parse PDF. Ensure it is a valid, unencrypted text-based PDF document.");
              addLog("Error occurred during PDF extraction step.", "error");
            }
          };

          // Loads sample data
          const loadDemoData = () => {
            setDocPages(SAMPLE_DOC);
            setFileName("quantum_computing_paper_demo.pdf");
            setCurrentPageIndex(0);
            setErrorMsg('');
            addLog("Loaded internal sample document. Switch parameters in sidebar to proceed.", "success");
          };

          // Dynamic initialization of Transformers.js to execute offline in the browser
          const initLocalEngine = async (modelId) => {
            if (localTranslatorRef.current && loadedModelId === modelId) {
              return localTranslatorRef.current;
            }

            setLocalEngineLoading(true);
            setLocalDownloadProgress({});
            addLog(`Loading on-device ML packages for model: "${modelId}"...`, "info");
            addLog("Checking browser cache for pre-downloaded model assets...", "info");

            try {
              // Import the browser module of Transformers.js dynamically via CDN
              const transformers = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.2');
              
              const progressCallback = (data) => {
                if (data.status === 'progress') {
                  setLocalDownloadProgress(prev => ({
                    ...prev,
                    [data.file]: {
                      progress: data.progress,
                      loaded: data.loaded,
                      total: data.total
                    }
                  }));
                } else if (data.status === 'ready') {
                  addLog(`Asset cached: ${data.file.split('/').pop()}`, "success");
                }
              };

              const translator = await transformers.pipeline('translation', modelId, {
                progress_callback: progressCallback
              });

              localTranslatorRef.current = translator;
              setLoadedModelId(modelId);
              setLocalEngineLoading(false);
              addLog("Local Model loaded into WebAssembly system cache successfully!", "success");
              return translator;
            } catch (err) {
              console.error(err);
              setLocalEngineLoading(false);
              addLog("Could not initialize Local Translation engine. Make sure you are serving this file from a local server (like Python, VS Code Live Server, or running via HTTPS) to allow browser Web Worker imports.", "error");
              throw new Error("Failed loading on-device package. Check Console for protocol restrictions.");
            }
          };

          // Execute translation via local browser WASM model
          const translateLocal = async (text, targetLanguage) => {
            const modelConfig = LOCAL_MODEL_MAP[targetLanguage];
            if (!modelConfig) {
              throw new Error(`Local model not configured for language: ${targetLanguage}`);
            }

            const translator = await initLocalEngine(modelConfig.id);
            
            const paragraphs = text.split('\n\n').filter(p => p.trim().length > 0);
            const translatedParagraphs = [];

            addLog(`Splitting document segment into ${paragraphs.length} blocks to optimize token processing.`, "info");

            for (let i = 0; i < paragraphs.length; i++) {
              addLog(`Translating on-device block ${i + 1}/${paragraphs.length}...`, "info");
              const result = await translator(paragraphs[i], {
                max_length: 512,
                callback_function: null
              });
              
              const translatedText = result[0]?.translation_text || '';
              translatedParagraphs.push(translatedText);
            }

            return {
              thoughts: `Executed 100% locally in-browser using Hugging Face (${modelConfig.id}). Evaluated block-by-block format locally.`,
              translation: translatedParagraphs.join('\n\n')
            };
          };

          // Cloud API Translation Sequence
          const fetchCloudTranslation = async (text, targetLanguage, styleTone, glossaryInstructions, retries = 5, delay = 1000) => {
            const systemPrompt = `You are an expert AI translation agent. Direct instructions:
            1. Translate to: ${targetLanguage}
            2. Stylistic Tone: ${styleTone}
            3. Glossary / Custom parameters: ${glossaryInstructions || 'None'}
            4. Maintain original spacing, paragraph linebreaks, variables, and structural layout. Do not write summaries.
            5. Respond only in a JSON wrapper containing 'thoughts' (your stylistic and grammar choices) and 'translation'.`;

            const payload = {
              contents: [{ parts: [{ text: text }] }],
              systemInstruction: { parts: [{ text: systemPrompt }] },
              generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                  type: "OBJECT",
                  properties: {
                    thoughts: { type: "STRING" },
                    translation: { type: "STRING" }
                  },
                  required: ["thoughts", "translation"]
                }
              }
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            for (let attempt = 1; attempt <= retries; attempt++) {
              try {
                const response = await fetch(url, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`Gemini status ${response.status}`);
                const data = await response.json();
                const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!textResponse) throw new Error("No payload returned.");
                return JSON.parse(textResponse);
              } catch (error) {
                if (attempt === retries) throw error;
                const backoff = delay * Math.pow(2, attempt - 1);
                await new Promise(resolve => setTimeout(resolve, backoff));
              }
            }
          };

          // Run processing orchestrator
          const startTranslation = async () => {
            if (docPages.length === 0) {
              setErrorMsg("No document loaded. Please upload a PDF or run the Sample PDF configuration.");
              return;
            }

            setIsProcessing(true);
            setProgress(0);
            setErrorMsg('');
            setActiveTab('terminal');
            addLog(`Initiating Workspace Engine... Selected Mode: ${engineMode.toUpperCase()}`, "info");

            const updatedPages = [...docPages];

            try {
              if (engineMode === 'local') {
                const modelConfig = LOCAL_MODEL_MAP[targetLang];
                await initLocalEngine(modelConfig.id);
              }

              for (let i = 0; i < updatedPages.length; i++) {
                const pageNum = updatedPages[i].pageNumber;
                addLog(`[Page ${pageNum}/${updatedPages.length}] Handing text coordinates to parser...`, "info");

                let response;
                if (engineMode === 'local') {
                  response = await translateLocal(updatedPages[i].originalText, targetLang);
                } else {
                  response = await fetchCloudTranslation(
                    updatedPages[i].originalText,
                    targetLang,
                    tone,
                    glossary
                  );
                }

                updatedPages[i].translatedText = response.translation;
                updatedPages[i].thoughts = response.thoughts;

                setDocPages([...updatedPages]);
                setProgress(Math.round(((i + 1) / updatedPages.length) * 100));
                addLog(`[Page ${pageNum}/${updatedPages.length}] Finished successfully.`, "success");
              }
              
              addLog("Translation workspace tasks completed successfully!", "success");
            } catch (err) {
              console.error(err);
              setErrorMsg(`Execution halted: ${err.message}`);
              addLog(`Translation runtime aborted. Error details: ${err.message}`, "error");
            } finally {
              setIsProcessing(false);
            }
          };

          const handleOriginalTextChange = (text) => {
            const updated = [...docPages];
            updated[currentPageIndex].originalText = text;
            setDocPages(updated);
          };

          const handleTranslatedTextChange = (text) => {
            const updated = [...docPages];
            updated[currentPageIndex].translatedText = text;
            setDocPages(updated);
          };

          // Export processed document to TXT / Markdown file
          const exportAsMarkdown = () => {
            if (docPages.length === 0) return;
            
            let content = `# Translated Document: ${fileName || "document"}\n`;
            content += `* Translated to **${targetLang}** (Engine: ${engineMode}) *\n\n`;
            content += `---\n\n`;

            docPages.forEach(p => {
              content += `## PAGE ${p.pageNumber}\n\n`;
              content += `${p.translatedText || "*Page was not translated*"}\n\n`;
              content += `---\n\n`;
            });

            const blob = new Blob([content], { type: 'text/markdown;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', `${fileName ? fileName.replace('.pdf', '') : 'translated'}_${targetLang.toLowerCase()}.md`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            addLog("Exported workspace successfully as Markdown.", "success");
          };

          // Export translated document to standard PDF
          const exportAsPdf = () => {
            if (docPages.length === 0) return;
            if (!window.jspdf) {
              setErrorMsg("PDF compiler package is not fully loaded yet.");
              return;
            }

            try {
              const { jsPDF } = window.jspdf;
              const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
              doc.setFont("Helvetica", "normal");
              
              docPages.forEach((p, idx) => {
                if (idx > 0) doc.addPage();
                
                doc.setFontSize(10);
                doc.setTextColor(140, 140, 140);
                doc.text(`DocuTranslate Page ${p.pageNumber} | Language Target: ${targetLang} (${engineMode})`, 15, 15);
                doc.line(15, 18, 195, 18);
                
                doc.setFontSize(11);
                doc.setTextColor(30, 30, 30);
                
                const lines = doc.splitTextToSize(p.translatedText || "[Empty page or omitted context]", 180);
                doc.text(lines, 15, 28);
              });

              doc.save(`${fileName ? fileName.replace('.pdf', '') : 'translated'}_${targetLang.toLowerCase()}.pdf`);
              addLog("Compiled and downloaded output PDF successfully.", "success");
            } catch (err) {
              console.error(err);
              setErrorMsg("Failed to assemble elements into PDF.");
            }
          };

          // Get active local model details to show nice download bars
          const activeModelDetails = LOCAL_MODEL_MAP[targetLang];
          const activeModelId = activeModelDetails?.id;
          const downloadFiles = Object.keys(localDownloadProgress);
          const averageProgress = downloadFiles.length > 0 
            ? Math.round(downloadFiles.reduce((acc, fn) => acc + (localDownloadProgress[fn].progress || 0), 0) / downloadFiles.length)
            : 0;

          return (
            <div className="min-h-screen bg-slate-950 text-slate-100 font-sans flex flex-col antialiased">
              {/* Premium Navigation and Status Header */}
              <header className="border-b border-slate-800 bg-slate-900/60 backdrop-blur sticky top-0 z-50 px-6 py-4 flex flex-wrap justify-between items-center gap-4">
                <div className="flex items-center space-x-3">
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-600 to-indigo-500 flex items-center justify-center shadow-lg shadow-violet-500/20">
                    <svg className="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold tracking-tight bg-gradient-to-r from-white via-slate-100 to-indigo-300 bg-clip-text text-transparent">
                      DocuTranslate AI Agent
                    </h1>
                    <p className="text-xs text-indigo-400 font-medium">Standalone Offline Browser Sandbox</p>
                  </div>
                </div>

                {/* Global Control Status */}
                <div className="flex items-center gap-3">
                  {engineMode === 'local' ? (
                    <span className="text-xs bg-emerald-500/10 border border-emerald-500/30 px-3 py-1.5 rounded-full text-emerald-400 font-semibold flex items-center gap-1.5 shadow-sm">
                      <span className="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span>
                      On-Device Mode (Offline, Free)
                    </span>
                  ) : (
                    <span className="text-xs bg-indigo-500/10 border border-indigo-500/30 px-3 py-1.5 rounded-full text-indigo-400 font-semibold flex items-center gap-1.5 shadow-sm">
                      <span className="h-2 w-2 rounded-full bg-indigo-400 animate-pulse"></span>
                      Cloud AI Mode (Requires API Key)
                    </span>
                  )}
                </div>
              </header>

              {/* Main Grid View */}
              <div className="flex-1 max-w-7xl w-full mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                {/* Left Control Sidebar */}
                <aside className="lg:col-span-4 flex flex-col gap-6">
                  
                  {/* Engine Selector */}
                  <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl">
                    <h2 className="text-xs font-bold tracking-wider uppercase text-slate-400 mb-3.5 flex items-center gap-2">
                      <svg className="w-4 h-4 text-violet-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                      </svg>
                      Translation Core Engine
                    </h2>

                    <div className="grid grid-cols-2 gap-2 bg-slate-950 p-1 rounded-xl border border-slate-800">
                      <button
                        type="button"
                        onClick={() => setEngineMode('local')}
                        className={`py-2 px-3 rounded-lg text-xs font-bold transition-all ${
                          engineMode === 'local' 
                            ? 'bg-violet-600 text-white shadow' 
                            : 'text-slate-400 hover:text-slate-200'
                        }`}
                      >
                        On-Device WASM
                      </button>
                      <button
                        type="button"
                        onClick={() => setEngineMode('cloud')}
                        className={`py-2 px-3 rounded-lg text-xs font-bold transition-all ${
                          engineMode === 'cloud' 
                            ? 'bg-violet-600 text-white shadow' 
                            : 'text-slate-400 hover:text-slate-200'
                        }`}
                      >
                        Cloud Agent
                      </button>
                    </div>

                    <p className="mt-3 text-[11px] text-slate-400 leading-relaxed">
                      {engineMode === 'local' 
                        ? '🟢 Runs fully in-browser via Transformers.js. No API Key required. Private & secure.'
                        : '☁️ Runs via Gemini. Highly accurate layout, tone, and dictionary capabilities.'}
                    </p>
                  </div>

                  {/* File Upload Panel */}
                  <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl">
                    <h2 className="text-xs font-bold tracking-wider uppercase text-slate-400 mb-4 flex items-center gap-2">
                      <svg className="w-4 h-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                      </svg>
                      Document Source
                    </h2>

                    <div className="border border-dashed border-slate-800 hover:border-violet-500/50 rounded-xl p-5 text-center transition-all relative cursor-pointer bg-slate-950/40">
                      <input 
                        type="file" 
                        accept="application/pdf"
                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                        onChange={handlePdfUpload}
                        disabled={isProcessing}
                      />
                      <div className="space-y-1.5 pointer-events-none">
                        <div className="w-8 h-8 rounded-lg bg-slate-900 mx-auto flex items-center justify-center text-slate-400">
                          <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                          </svg>
                        </div>
                        <div>
                          <span className="block text-xs font-semibold text-slate-300">Drop PDF here</span>
                          <span className="text-[10px] text-slate-500">Fast client parsing</span>
                        </div>
                      </div>
                    </div>

                    <div className="mt-4 flex flex-col gap-2">
                      <button
                        type="button"
                        onClick={loadDemoData}
                        disabled={isProcessing}
                        className="w-full text-xs text-indigo-400 hover:text-indigo-300 bg-indigo-500/5 hover:bg-indigo-500/10 py-2 px-4 rounded-xl border border-indigo-500/20 font-medium transition-all"
                      >
                        ⚡ Use Sample Research Paper
                      </button>
                    </div>

                    {fileName && (
                      <div className="mt-4 p-3 bg-slate-950 rounded-xl border border-slate-800 flex items-center justify-between">
                        <div className="truncate pr-2">
                          <span className="block text-[10px] text-slate-500">Source Document</span>
                          <span className="text-xs font-semibold text-emerald-400 truncate block">{fileName}</span>
                        </div>
                        <button 
                          type="button"
                          onClick={() => { setDocPages([]); setFileName(''); }}
                          className="text-slate-400 hover:text-rose-400 transition-colors"
                          title="Clear document"
                        >
                          <svg className="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                          </svg>
                        </button>
                      </div>
                    )}
                  </div>

                  {/* Translation Options Configuration */}
                  <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl space-y-4">
                    <h2 className="text-xs font-bold tracking-wider uppercase text-slate-400 flex items-center gap-2">
                      <svg className="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                      </svg>
                      Parameters
                    </h2>

                    {/* Target Language dropdown */}
                    <div>
                      <label className="block text-[11px] font-semibold text-slate-400 mb-1.5">Target Language (English Source)</label>
                      <select
                        value={targetLang}
                        onChange={(e) => setTargetLang(e.target.value)}
                        disabled={isProcessing}
                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-violet-500"
                      >
                        <option value="Spanish">Spanish (Español)</option>
                        <option value="French">French (Français)</option>
                        <option value="German">German (Deutsch)</option>
                        <option value="Vietnamese">Vietnamese (Tiếng Việt)</option>
                        <option value="Japanese">Japanese (日本語)</option>
                        <option value="Chinese">Chinese (简体中文)</option>
                        <option value="Arabic">Arabic (العربية)</option>
                        <option value="Russian">Russian (Русский)</option>
                      </select>
                    </div>

                    {/* Stylistic Tone (Only used in Cloud mode) */}
                    {engineMode === 'cloud' && (
                      <div>
                        <label className="block text-[11px] font-semibold text-slate-400 mb-1.5">Stylistic Polish Tone</label>
                        <select
                          value={tone}
                          onChange={(e) => setTone(e.target.value)}
                          disabled={isProcessing}
                          className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-violet-500"
                        >
                          <option value="Professional">Professional (Corporate)</option>
                          <option value="Academic">Academic (Technical Research)</option>
                          <option value="Casual">Casual (Fluid Dialogue)</option>
                        </select>
                      </div>
                    )}

                    {/* Custom Guidelines (Only used in Cloud mode) */}
                    {engineMode === 'cloud' && (
                      <div>
                        <label className="block text-[11px] font-semibold text-slate-400 mb-1.5">Custom Dictionary Glossary</label>
                        <textarea
                          value={glossary}
                          onChange={(e) => setGlossary(e.target.value)}
                          disabled={isProcessing}
                          rows={2}
                          className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-[11px] text-slate-300 focus:outline-none focus:border-violet-500 font-mono resize-none"
                        />
                      </div>
                    )}

                    {/* Start Translation Button */}
                    <button
                      type="button"
                      onClick={startTranslation}
                      disabled={isProcessing || docPages.length === 0}
                      className={`w-full py-3 px-4 rounded-xl font-bold text-xs transition-all flex items-center justify-center gap-2 shadow-lg ${
                        docPages.length === 0 
                          ? 'bg-slate-800 text-slate-500 cursor-not-allowed border border-slate-800/50' 
                          : isProcessing
                          ? 'bg-violet-600/50 text-white cursor-wait'
                          : 'bg-gradient-to-r from-violet-600 to-indigo-500 hover:from-violet-500 hover:to-indigo-400 text-white shadow-violet-600/10 hover:shadow-violet-500/20'
                      }`}
                    >
                      {isProcessing ? (
                        <>
                          <svg className="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
                          </svg>
                          Processing Document...
                        </>
                      ) : (
                        <>
                          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
                          </svg>
                          Execute Translation Loop
                        </>
                      )}
                    </button>
                  </div>
                </aside>

                {/* Right Side Primary Display */}
                <main className="lg:col-span-8 flex flex-col gap-6">
                  
                  {/* Main Display Area */}
                  <div className="bg-slate-900 border border-slate-800 rounded-2xl flex flex-col overflow-hidden shadow-xl">
                    
                    {/* Header Area */}
                    <div className="border-b border-slate-800 px-6 py-4 flex flex-wrap justify-between items-center gap-4 bg-slate-900/40">
                      <div className="flex items-center space-x-2">
                        <button
                          type="button"
                          onClick={() => setActiveTab('editor')}
                          className={`px-3.5 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition-all ${
                            activeTab === 'editor' 
                              ? 'bg-slate-800 text-slate-100 shadow' 
                              : 'text-slate-400 hover:text-slate-200'
                          }`}
                        >
                          Workspace Editor
                        </button>
                        <button
                          type="button"
                          onClick={() => setActiveTab('terminal')}
                          className={`px-3.5 py-1.5 rounded-lg text-xs font-semibold tracking-wide transition-all flex items-center gap-1.5 ${
                            activeTab === 'terminal' 
                      ? 'bg-slate-800 text-slate-100 shadow' 
                      : 'text-slate-400 hover:text-slate-200'
                  }`}
                >
                  <span className="h-1.5 w-1.5 rounded-full bg-violet-400 animate-pulse"></span>
                  Agent Terminal
                </button>
              </div>

              {/* Exporters */}
              <div className="flex items-center gap-2">
                <button
                  type="button"
                  onClick={exportAsMarkdown}
                  disabled={docPages.length === 0}
                  className="bg-slate-800 hover:bg-slate-700 disabled:opacity-50 text-slate-200 text-xs font-medium py-1.5 px-3 rounded-lg transition-all flex items-center gap-1.5"
                >
                  <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                  </svg>
                  MD Export
                </button>
                <button
                  type="button"
                  onClick={exportAsPdf}
                  disabled={docPages.length === 0}
                  className="bg-violet-600 hover:bg-violet-500 disabled:opacity-50 text-white text-xs font-medium py-1.5 px-3 rounded-lg transition-all flex items-center gap-1.5"
                >
                  <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                  </svg>
                  PDF Compile
                </button>
              </div>
            </div>

            {/* Error Message Flag */}
            {errorMsg && (
              <div className="bg-rose-950/40 border-b border-rose-800/30 p-4 flex items-center gap-3">
                <svg className="w-4 h-4 text-rose-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <div className="text-xs text-rose-300 font-medium">{errorMsg}</div>
              </div>
            )}

            {/* Offline Model Assets Download Tracker */}
            {localEngineLoading && (
              <div className="bg-slate-950 border-b border-slate-800/80 p-5 space-y-3">
                <div className="flex justify-between items-center text-xs">
                  <div className="flex items-center gap-2 text-violet-400 font-semibold">
                    <svg className="animate-spin h-3.5 w-3.5" fill="none" viewBox="0 0 24 24">
                      <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                      <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
                    </svg>
                    Compiling Local Neural Model ({activeModelId})
                  </div>
                  <span className="text-slate-400 font-mono font-bold">{averageProgress}%</span>
                </div>
                <div className="w-full bg-slate-900 rounded-full h-2 overflow-hidden">
                  <div 
                    className="bg-violet-500 h-2 transition-all duration-300" 
                    style={{ width: `${averageProgress}%` }}
                  ></div>
                </div>
                <div className="text-[10px] text-slate-500 leading-relaxed font-mono">
                  &gt; Downloading model weights from Hugging Face. Storing locally to browser cache. Files are stored once and will run offline.
                </div>
              </div>
            )}

            {/* Editor Workspace Tab content */}
            {activeTab === 'editor' && (
              <div className="p-6 space-y-6">
                {docPages.length === 0 ? (
                  <div className="text-center py-24">
                    <svg className="w-12 h-12 text-slate-700 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <h3 className="text-sm font-semibold text-slate-300">No active workspace loaded</h3>
                    <p className="text-xs text-slate-500 max-w-sm mx-auto mt-1">
                      Upload a PDF file, or click 'Use Sample Research Paper' to test the Local WASM engine instantly.
                    </p>
                  </div>
                ) : (
                  <div className="space-y-6">
                    {/* Page Navigator */}
                    <div className="flex items-center justify-between bg-slate-950 p-2.5 rounded-xl border border-slate-800">
                      <button
                        type="button"
                        onClick={() => setCurrentPageIndex(prev => Math.max(0, prev - 1))}
                        disabled={currentPageIndex === 0}
                        className="bg-slate-900 border border-slate-800 disabled:opacity-30 hover:bg-slate-800 text-slate-200 px-3 py-1.5 rounded-lg text-xs transition-colors"
                      >
                        Prev Page
                      </button>
                      <span className="text-xs font-semibold text-slate-400">
                        Page {currentPageIndex + 1} of {docPages.length}
                      </span>
                      <button
                        type="button"
                        onClick={() => setCurrentPageIndex(prev => Math.min(docPages.length - 1, prev + 1))}
                        disabled={currentPageIndex === docPages.length - 1}
                        className="bg-slate-900 border border-slate-800 disabled:opacity-30 hover:bg-slate-800 text-slate-200 px-3 py-1.5 rounded-lg text-xs transition-colors"
                      >
                        Next Page
                      </button>
                    </div>

                    {/* Agent logic Strategy Banner */}
                    {docPages[currentPageIndex]?.thoughts && (
                      <div className="bg-indigo-950/25 border border-indigo-500/20 rounded-xl p-4">
                        <div className="flex items-center gap-2 text-indigo-400 text-xs font-semibold mb-1">
                          <svg className="w-4 h-4 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                          </svg>
                          Translation Engine Insights
                        </div>
                        <p className="text-xs italic text-slate-300 leading-relaxed">
                          "{docPages[currentPageIndex].thoughts}"
                        </p>
                      </div>
                    )}

                    {/* Double Editing Panels */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {/* Original Content */}
                      <div className="flex flex-col gap-2">
                        <div className="flex items-center justify-between">
                          <label className="text-xs font-semibold text-slate-400">Extracted original text</label>
                          <span className="text-[10px] text-slate-500 font-mono">Editable Source</span>
                        </div>
                        <textarea
                          value={docPages[currentPageIndex]?.originalText || ''}
                          onChange={(e) => handleOriginalTextChange(e.target.value)}
                          rows={14}
                          className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-xs font-mono text-slate-300 leading-relaxed focus:outline-none focus:border-violet-500 resize-y"
                        />
                      </div>

                      {/* Output Result panel */}
                      <div className="flex flex-col gap-2">
                        <div className="flex items-center justify-between">
                          <label className="text-xs font-semibold text-violet-400">Translation output ({targetLang})</label>
                          <span className="text-[10px] text-slate-500 font-mono">Output Sandbox</span>
                        </div>
                        <textarea
                          value={docPages[currentPageIndex]?.translatedText || ''}
                          onChange={(e) => handleTranslatedTextChange(e.target.value)}
                          placeholder={isProcessing ? "Local WebAssembly engine processing text..." : "Output appears here. Click the launch button above to initiate operations."}
                          rows={14}
                          className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-xs font-mono text-slate-200 leading-relaxed focus:outline-none focus:border-violet-500 resize-y"
                        />
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Agent terminal monitor tab */}
            {activeTab === 'terminal' && (
              <div className="p-6 bg-slate-950 flex flex-col h-[520px]">
                <div className="flex items-center justify-between border-b border-slate-800 pb-3 mb-4">
                  <div className="flex items-center gap-2 text-slate-400 text-xs font-mono">
                    <span className="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-ping"></span>
                    <span>System Shell Logs</span>
                  </div>
                  <button 
                    type="button"
                    onClick={() => setLogs([])}
                    className="text-[11px] text-slate-500 hover:text-slate-300 font-mono transition-colors"
                  >
                    Clear Console
                  </button>
                </div>

                <div className="flex-1 overflow-y-auto space-y-2 pr-2 font-mono text-xs">
                  {logs.length === 0 ? (
                    <div className="text-center py-20 text-slate-600">
                      &gt; Console inactive. Extract data or trigger translators to initialize processes.
                    </div>
                  ) : (
                    logs.map((log) => {
                      let color = "text-indigo-400";
                      let prefix = "[INFO]";
                      if (log.type === 'success') {
                        color = "text-emerald-400";
                        prefix = "[OK]";
                      } else if (log.type === 'error') {
                        color = "text-rose-400";
                        prefix = "[ERR]";
                      }

                      return (
                        <div key={log.id} className="leading-relaxed border-b border-slate-900 pb-1.5 flex items-start gap-2.5">
                          <span className="text-slate-600 shrink-0 font-light select-none">{log.time}</span>
                          <span className={`${color} shrink-0 font-bold`}>{prefix}</span>
                          <span className="text-slate-300 whitespace-pre-wrap">{log.message}</span>
                        </div>
                      );
                    })
                  )}
                </div>
              </div>
            )}
          </div>
        </main>
      </div>

      {/* Footer Details */}
      <footer className="border-t border-slate-900 bg-slate-950/80 p-5 mt-auto text-center text-[11px] text-slate-500 leading-relaxed">
        <div>Optimized with browser-native WASM compilation. Zero telemetry data transmitted when using local mode.</div>
        <div className="mt-1">© 2026 Local DocuTranslate Systems. Powered by Xenova & Hugging Face.</div>
      </footer>
    </div>
  );
}

        // Mount React standalone application
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
