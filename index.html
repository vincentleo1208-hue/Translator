<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocuTranslate AI Agent</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased">

  <div id="root"></div>

  <script type="text/babel">
    // Extract state controls straight from the global React window instance
    const { useState, useEffect, useRef } = React;

    // API Key configuration placeholder
    const apiKey = "";

    function App() {
      // Application States
      const [docPages, setDocPages] = useState([]);
      const [currentPageIndex, setCurrentPageIndex] = useState(0);
      const [fileName, setFileName] = useState('');
      const [targetLang, setTargetLang] = useState('Spanish');
      const [tone, setTone] = useState('Professional');
      const [glossary, setGlossary] = useState('Translate technical terms accurately. Keep standard unit abbreviations intact.');
      const [isProcessing, setIsProcessing] = useState(false);
      const [progress, setProgress] = useState(0);
      const [logs, setLogs] = useState([]);
      const [activeTab, setActiveTab] = useState('editor'); 
      const [errorMsg, setErrorMsg] = useState('');

      const SAMPLE_DOC = [
        {
          pageNumber: 1,
          originalText: `Abstract—Quantum computing represents a paradigm shift in processing power, leveraging superposition and entanglement to solve problems intractable for classical computers.\n\nIn this paper, we present a novel topological qubit architecture. By utilizing Majorana fermions at the interfaces of superconductor-semiconductor heterostructures, we achieve a 10x improvement in coherence times (T1).\n\nI. INTRODUCTION\nClassical logic gates operate on binary states (0 or 1). Quantum bits, or qubits, exist in linear combinations of states, allowing exponential parallel computations. However, environmental decoherence remains the primary challenge to building a fault-tolerant quantum computer.`,
          translatedText: '',
          thoughts: ''
        },
        {
          pageNumber: 2,
          originalText: `II. EXPERIMENTAL SETUP & CRYOGENICS\nThe experimental apparatus operates inside a dilution refrigerator capable of cooling the superconductor down to a mixing chamber temperature of 10 mK (milli-Kelvin).\n\nHigh-frequency coaxial cables deliver microwave control pulses directly to the quantum chip.\n\nFigure 2.1 displays the feedback loop of our cryogenic interface. We observe critical currents of up to 450 nA, verifying robust topological phase transitions. These physical conditions require pristine isolation from electromagnetic interference (EMI).`,
          translatedText: '',
          thoughts: ''
        }
      ];

      // Initialize Core dependencies once DOM hooks match
      useEffect(() => {
        if (window.pdfjsLib) {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
          addLog("Agent initialization complete. Parser engine & PDF exporter successfully loaded.", "info");
        } else {
          addLog("Error loading core parsing extensions.", "error");
        }
      }, []);

      const addLog = (message, type = 'info') => {
        const timestamp = new Date().toLocaleTimeString();
        setLogs(prev => [
          { id: Date.now() + Math.random(), time: timestamp, message, type },
          ...prev
        ]);
      };

      const handlePdfUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        setFileName(file.name);
        setDocPages([]);
        setCurrentPageIndex(0);
        setErrorMsg('');
        addLog(`Uploaded file detected: "${file.name}". Starting extraction pipeline...`, "info");

        try {
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          addLog(`PDF structure parsed. Total pages: ${pdf.numPages}. Initializing text extraction...`, "info");

          const pagesData = [];
          for (let i = 1; i <= pdf.numPages; i++) {
            addLog(`Extracting text structure from Page ${i}...`, "info");
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            
            let lastY = null;
            let lines = [];
            let currentLine = [];
            
            textContent.items.forEach(item => {
              const y = item.transform[5];
              if (lastY === null || Math.abs(y - lastY) < 6) {
                currentLine.push(item.str);
              } else {
                lines.push(currentLine.join(' '));
                currentLine = [item.str];
              }
              lastY = y;
            });
            
            if (currentLine.length > 0) lines.push(currentLine.join(' '));

            const pageText = lines.join('\n');
            pagesData.push({
              pageNumber: i,
              originalText: pageText || "[Empty page or scanned element without embedded text]",
              translatedText: '',
              thoughts: ''
            });
          }

          setDocPages(pagesData);
          addLog("PDF text extracted successfully. Ready to run translating agent.", "success");
        } catch (error) {
          console.error(error);
          setErrorMsg("Failed to parse PDF. Ensure it is a valid, unencrypted text-based PDF document.");
          addLog("Error occurred during PDF extraction step.", "error");
        }
      };

      const loadDemoData = () => {
        setDocPages(SAMPLE_DOC);
        setFileName("quantum_computing_paper_demo.pdf");
        setCurrentPageIndex(0);
        setErrorMsg('');
        addLog("Loaded internal sample document. Feel free to evaluate standard capabilities.", "success");
      };

      const fetchTranslationWithRetry = async (text, targetLanguage, styleTone, glossaryInstructions, retries = 5, delay = 1000) => {
        const systemPrompt = `You are a professional PDF document translating agent. Your objective is to read extracted document page layouts, carefully analyze key terminology, context, style guides, and translate the text accurately to the target language.\n\nDIRECTIONS:\n1. Translate to: ${targetLanguage}\n2. Tone: ${styleTone}\n3. Terminology & Override Glossary Rules: ${glossaryInstructions || 'None'}\n4. Preserve structural indentation, paragraph spacings, and technical equations/variables. Do not summarize unless requested.\n5. Provide your response as a structured JSON object. First, write down your Agent "thoughts" evaluating specific semantic risks or vocabulary choices. Second, provide the detailed translation text.`;

        const payload = {
          contents: [{ parts: [{ text: text }] }],
          systemInstruction: { parts: [{ text: systemPrompt }] },
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                thoughts: { type: "STRING" },
                translation: { type: "STRING" }
              },
              required: ["thoughts", "translation"]
            }
          }
        };

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

        for (let attempt = 1; attempt <= retries; attempt++) {
          try {
            const response = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error(`Gemini API returned status ${response.status}`);
            const data = await response.json();
            const jsonText = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!jsonText) throw new Error("No text response received from Gemini.");
            
            return JSON.parse(jsonText);
          } catch (error) {
            if (attempt === retries) throw error;
            const backoffDelay = delay * Math.pow(2, attempt - 1);
            await new Promise(resolve => setTimeout(resolve, backoffDelay));
          }
        }
      };

      const startTranslationAgent = async () => {
        if (docPages.length === 0) {
          setErrorMsg("No document loaded. Please upload a PDF file or click 'Use Sample Research Paper'.");
          return;
        }

        setIsProcessing(true);
        setProgress(0);
        setErrorMsg('');
        setActiveTab('terminal');
        addLog(`Initiating Agent Core. Target language: ${targetLang}, Styling Tone: ${tone}.`, "info");

        const updatedPages = [...docPages];

        for (let i = 0; i < updatedPages.length; i++) {
          const pageNum = updatedPages[i].pageNumber;
          addLog(`[Page ${pageNum}/${updatedPages.length}] Running Layout Analysis & Style Mapping...`, "info");
          
          try {
            const response = await fetchTranslationWithRetry(
              updatedPages[i].originalText,
              targetLang,
              tone,
              glossary
            );

            updatedPages[i].translatedText = response.translation;
            updatedPages[i].thoughts = response.thoughts;

            addLog(`[Agent Brainstorming Page ${pageNum}]: "${response.thoughts.slice(0, 120)}..."`, "success");
            setDocPages([...updatedPages]);
            setProgress(Math.round(((i + 1) / updatedPages.length) * 100));
          } catch (err) {
            console.error(err);
            addLog(`[Error Page ${pageNum}] Failed to execute translation. API Key missing or limits hit.`, "error");
            setErrorMsg(`API Agent process halted. Add your valid Gemini API Key to the code configuration.`);
            break;
          }
        }

        setIsProcessing(false);
      };

      const exportAsMarkdown = () => {
        if (docPages.length === 0) return;
        let content = `# Translated Document: ${fileName || "document"}\n* Target: ${targetLang} (${tone} tone) *\n\n---\n\n`;
        docPages.forEach(p => {
          content += `## PAGE ${p.pageNumber}\n\n${p.translatedText || "*Page was not translated*"}\n\n---\n\n`;
        });

        const blob = new Blob([content], { type: 'text/markdown;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.setAttribute('download', `${fileName ? fileName.replace('.pdf', '') : 'translated'}_${targetLang.toLowerCase()}.md`);
        link.click();
        addLog("Exported successfully as Markdown (.md).", "success");
      };

      const exportAsPdf = () => {
        if (docPages.length === 0) return;
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
          doc.setFont("Helvetica", "normal");
          
          docPages.forEach((p, idx) => {
            if (idx > 0) doc.addPage();
            doc.setFontSize(10);
            doc.setTextColor(140, 140, 140);
            doc.text(`Translated Page ${p.pageNumber} | Target: ${targetLang}`, 15, 15);
            doc.line(15, 18, 195, 18);
            
            doc.setFontSize(11);
            doc.setTextColor(30, 30, 30);
            const lines = doc.splitTextToSize(p.translatedText || "[Page untranslated]", 180);
            doc.text(lines, 15, 28);
          });

          doc.save(`${fileName ? fileName.replace('.pdf', '') : 'translated'}_${targetLang.toLowerCase()}.pdf`);
          addLog("Compiled and downloaded output PDF successfully.", "success");
        } catch (err) {
          setErrorMsg("Failed to compile layout elements into PDF.");
        }
      };

      return (
        <div className="min-h-screen flex flex-col bg-slate-950 text-slate-100 font-sans antialiased">
          <header className="border-b border-slate-800 bg-slate-900/60 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
            <div className="flex items-center space-x-3">
              <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-cyan-400 flex items-center justify-center shadow-lg">
                <span className="text-white font-bold text-lg">A</span>
              </div>
              <div>
                <h1 className="text-xl font-bold tracking-tight text-white">DocuTranslate AI Agent</h1>
                <p className="text-xs text-slate-400">Contextual Layout & Phrase Translation Sandbox</p>
              </div>
            </div>
            <div>
              {isProcessing ? (
                <div className="bg-slate-800 px-4 py-2 rounded-lg border border-indigo-500/30 text-sm text-indigo-300">
                  Agent Translating ({progress}%)
                </div>
              ) : (
                <span className="text-xs bg-slate-800/60 border border-slate-700 px-3 py-1.5 rounded-full text-slate-400 flex items-center gap-2">
                  <span className="h-2 w-2 rounded-full bg-emerald-500"></span> Active Sandbox
                </span>
              )}
            </div>
          </header>

          <div className="flex-1 max-w-7xl w-full mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
            <aside className="lg:col-span-4 flex flex-col gap-6">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl">
                <h2 className="text-sm font-semibold text-slate-400 mb-4 uppercase tracking-wide">Input PDF Document</h2>
                <div className="border-2 border-dashed border-slate-800 hover:border-indigo-500/50 rounded-xl p-5 text-center relative cursor-pointer group bg-slate-950/40">
                  <input type="file" accept="application/pdf" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={handlePdfUpload} disabled={isProcessing} />
                  <div className="space-y-2">
                    <div className="text-sm font-medium text-slate-300">Upload PDF document</div>
                    <div className="text-xs text-slate-500">Extract elements dynamically</div>
                  </div>
                </div>
                <div className="mt-4 flex flex-col gap-2">
                  <button onClick={loadDemoData} disabled={isProcessing} className="w-full text-xs text-indigo-400 bg-indigo-500/10 hover:bg-indigo-500/20 py-2.5 rounded-xl border border-indigo-500/20 transition-all font-medium">
                    ⚡ Use Sample Research Paper (Multi-page)
                  </button>
                </div>
                {fileName && (
                  <div className="mt-4 p-3 bg-slate-950 rounded-xl border border-slate-800 flex justify-between items-center">
                    <div className="truncate"><span className="block text-xs text-slate-500">Active File</span><span className="text-sm font-medium text-emerald-400">{fileName}</span></div>
                  </div>
                )}
              </div>

              <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl space-y-4">
                <h2 className="text-sm font-semibold text-slate-400 uppercase tracking-wide">Agent Parameters</h2>
                <div>
                  <label className="block text-xs text-slate-400 mb-1">Target Language</label>
                  <select value={targetLang} onChange={(e) => setTargetLang(e.target.value)} disabled={isProcessing} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200">
                    <option value="Spanish">Spanish (Español)</option>
                    <option value="French">French (Français)</option>
                    <option value="German">German (Deutsch)</option>
                    <option value="Vietnamese">Vietnamese (Tiếng Việt)</option>
                    <option value="Japanese">Japanese (日本語)</option>
                  </select>
                </div>
                <div>
                  <label className="block text-xs text-slate-400 mb-1">Tone Style Guide</label>
                  <select value={tone} onChange={(e) => setTone(e.target.value)} disabled={isProcessing} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200">
                    <option value="Professional">Professional (Corporate)</option>
                    <option value="Academic">Academic (Research Standard)</option>
                    <option value="Casual">Casual / Fluent</option>
                  </select>
                </div>
                <div>
                  <label className="block text-xs text-slate-400 mb-1">Custom Glossary Instructions</label>
                  <textarea value={glossary} onChange={(e) => setGlossary(e.target.value)} disabled={isProcessing} rows={3} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs font-mono text-slate-300 resize-none" />
                </div>
                <button onClick={startTranslationAgent} disabled={isProcessing || docPages.length === 0} className={`w-full py-3 rounded-xl font-bold transition-all text-sm ${docPages.length === 0 ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-500 text-white'}`}>
                  Execute Agent Translation
                </button>
              </div>
            </aside>

            <main className="lg:col-span-8 flex flex-col gap-6">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl flex flex-col overflow-hidden shadow-xl">
                <div className="border-b border-slate-800 px-6 py-4 flex justify-between items-center bg-slate-900/40">
                  <div className="flex space-x-2">
                    <button onClick={() => setActiveTab('editor')} className={`px-4 py-2 rounded-xl text-xs font-semibold ${activeTab === 'editor' ? 'bg-slate-800 text-slate-100' : 'text-slate-400'}`}>Workspace</button>
                    <button onClick={() => setActiveTab('terminal')} className={`px-4 py-2 rounded-xl text-xs font-semibold ${activeTab === 'terminal' ? 'bg-slate-800 text-slate-100' : 'text-slate-400'}`}>Terminal Logs</button>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={exportAsMarkdown} disabled={docPages.length === 0} className="bg-slate-800 text-slate-200 text-xs py-2 px-3 rounded-xl hover:bg-slate-700">MD Export</button>
                    <button onClick={exportAsPdf} disabled={docPages.length === 0} className="bg-indigo-600 text-white text-xs py-2 px-3 rounded-xl hover:bg-indigo-500">PDF Compile</button>
                  </div>
                </div>

                {errorMsg && (
                  <div className="bg-rose-950/40 border-b border-rose-900 p-4 text-xs text-rose-300">⚠️ {errorMsg}</div>
                )}

                {activeTab === 'editor' ? (
                  <div className="p-6 space-y-6">
                    {docPages.length === 0 ? (
                      <div className="text-center py-24 text-slate-600 text-sm">No active file sandbox running. Upload a file or click the demo button.</div>
                    ) : (
                      <div className="space-y-4">
                        <div className="flex justify-between items-center bg-slate-950 p-3 rounded-xl border border-slate-800 text-xs">
                          <button onClick={() => setCurrentPageIndex(p => Math.max(0, p - 1))} disabled={currentPageIndex === 0} className="text-slate-300 disabled:opacity-30">Previous</button>
                          <span className="text-slate-400 font-medium">Page {currentPageIndex + 1} of {docPages.length}</span>
                          <button onClick={() => setCurrentPageIndex(p => Math.min(docPages.length - 1, p + 1))} disabled={currentPageIndex === docPages.length - 1} className="text-slate-300 disabled:opacity-30">Next</button>
                        </div>

                        {docPages[currentPageIndex]?.thoughts && (
                          <div className="bg-indigo-950/20 border border-indigo-500/20 rounded-xl p-4 text-xs text-slate-300 italic">
                            <span className="block text-indigo-400 font-bold not-italic mb-1">🧠 Agent Insight strategy:</span>
                            "{docPages[currentPageIndex].thoughts}"
                          </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div>
                            <label className="block text-xs text-slate-500 mb-1">Extracted Source Text</label>
                            <textarea readOnly value={docPages[currentPageIndex]?.originalText || ''} rows={12} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-xs font-mono text-slate-400 resize-none" />
                          </div>
                          <div>
                            <label className="block text-xs text-indigo-400 mb-1">Translated Output ({targetLang})</label>
                            <textarea value={docPages[currentPageIndex]?.translatedText || ''} onChange={(e) => {
                              const updated = [...docPages];
                              updated[currentPageIndex].translatedText = e.target.value;
                              setDocPages(updated);
                            }} rows={12} className="w-full bg-slate-950 border border-indigo-950/40 focus:border-indigo-500 rounded-xl p-4 text-xs font-mono text-slate-200 resize-none focus:outline-none" />
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="p-6 bg-slate-950 h-[450px] overflow-y-auto font-mono text-xs space-y-2">
                    {logs.length === 0 ? (
                      <div className="text-slate-700">&gt; Console idling. waiting for file system instructions...</div>
                    ) : (
                      logs.map(log => (
                        <div key={log.id} className="flex gap-2">
                          <span className="text-slate-600">{log.time}</span>
                          <span className={log.type === 'success' ? 'text-emerald-400' : log.type === 'error' ? 'text-rose-400' : 'text-indigo-400'}>
                            [{log.type.toUpperCase()}]
                          </span>
                          <span className="text-slate-300">{log.message}</span>
                        </div>
                      ))
                    )}
                  </div>
                )}
              </div>
            </main>
          </div>
        </div>
      );
    }

    // Mount the single root execution tree
    const root = 本DOM = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
